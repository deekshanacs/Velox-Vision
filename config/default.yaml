# Velox Vision Configuration System

detection:
  # Path to the primary model weights file
  model_path: "models/weights/yolo11n.pt"
  
  # Fallback model weights file if primary fails to load
  fallback_path: "models/weights/yolov8n.pt"
  
  # Confidence threshold filter (0.0 to 1.0)
  confidence_threshold: 0.50

  # Intersection over Union (IoU) threshold for Non-Maximum Suppression (NMS)
  iou_threshold: 0.45
  
  # Target device for running inference ('auto', 'cpu', 'cuda', 'mps')
  device: "auto"
  
  # Enable model warm-up on initialization
  warmup: true
  
  # Target classes to filter for (others will be discarded)
  classes:
    - car
    - motorcycle
    - bus
    - truck

runner:
  # Default input video file path relative to project root
  input_video: "data/videos/traffic.mp4"
  
  # Target output directory
  output_dir: "outputs/processed_videos/"
  
  # Display OpenCV preview window during execution (ignored if benchmark is true)
  show_preview: true
  
  # Save the annotated frames to output video file
  save_output: true

  # Process every N-th frame (1 = process every frame, 2 = process every 2nd frame, etc.)
  frame_skip: 1

  # Disable visualization previews and render frames as fast as possible
  benchmark: false

filtering:
  # Discard vehicle detections whose height is less than this ratio of the frame height
  min_height_ratio: 0.005

reports:
  # Folder to store benchmark run summary reports
  output_dir: "outputs/reports/"
  
  # Save JSON summary logs
  save_summary: true

snapshots:
  # Folder to save the final frame visual preview
  output_dir: "outputs/snapshots/"

tracking:
  # Enable/disable tracking module
  enabled: true
  
  # Type identifier of the tracker implementation ('bytetrack', 'deepsort')
  tracker_type: "bytetrack"
  
  # Max frames center history positions to record per vehicle
  history_size: 30
  
  # Max frames to retain a lost track before removal
  max_lost_frames: 30
  
  # Number of consecutive frames needed to confirm a track
  tentative_frames: 3
  
  # Enable tracking statistics telemetry tracking
  metrics_enabled: true

  # ByteTrack specific parameters
  track_activation_threshold: 0.25
  minimum_matching_threshold: 0.8
  track_buffer: 30
  min_box_area: 10.0
  frame_rate: 25.0
  
  # Visual track indicators configuration
  visualization:
    show_trails: false
    show_ids: true

memory:
  # Enable/disable vehicle memory subsystem
  enabled: true
  
  # Max snapshots to store in memory per vehicle track history
  max_snapshots: 300
  
  # Cleanup scan frame interval to clear repository memory records
  cleanup_interval: 500
  
  # Enable aggregate memory statistics logging
  statistics_enabled: true
  
  # Enable tracking of confidence score metrics history
  confidence_history: true
